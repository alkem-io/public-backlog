name: Auto-add 'in-progress' label when Status is 'In Progress'

on:
  project:
    types: [edited]  # Triggers when a project item is edited
    projects: ["53"]  # e.g., "123"

jobs:
  add-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add 'in-progress' label when Status is 'In Progress'
        uses: actions/github-script@v6
        with:
          script: |
            // 1. Get the edited project item
            const { node: item } = await github.graphql(`
              query($itemId: ID!) {
                node(id: $itemId) {
                  ... on ProjectV2Item {
                    id
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          field {
                            ... on ProjectV2SingleSelectField {
                              name
                            }
                          }
                          name
                        }
                      }
                    }
                    content {
                      ... on Issue {
                        id
                        number
                        repository {
                          name
                          owner {
                            login
                          }
                        }
                        labels(first: 10) {
                          nodes {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              itemId: context.payload.project.node_id
            });

            // 2. Check if the "Status" field is set to "In Progress"
            const statusField = item.fieldValues.nodes.find(
              field => field.field?.name === "Status"
            );

            if (statusField?.name === "In Progress") {
              const issue = item.content;
              const hasLabel = issue.labels.nodes.some(label => label.name === "in-progress");

              // 3. Fetch the 'in-progress' label ID dynamically
              const { repository: { label } } = await github.graphql(`
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    label(name: "in-progress") {
                      id
                    }
                  }
                }
              `, {
                owner: issue.repository.owner.login,
                repo: issue.repository.name
              });

              // 4. Add the label if missing
              if (!hasLabel && label) {
                await github.graphql(`
                  mutation($issueId: ID!, $labelId: ID!) {
                    addLabelsToLabelable(input: {
                      labelableId: $issueId,
                      labelIds: [$labelId]
                    }) {
                      clientMutationId
                    }
                  }
                `, {
                  issueId: issue.id,
                  labelId: label.id
                });
              }
            }
